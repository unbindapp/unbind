name: 📦 Publish Charts

on:
  push:
    branches: [master]
    paths:
      - "deploy/charts/charts/**"
      - ".github/workflows/publish-charts.yml"
  workflow_dispatch:

concurrency:
  group: publish-charts-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write # push charts to ghcr.io

jobs:
  publish:
    name: 🚀 Package and Push
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        chart:
          - buildkitd
          - database
          - registry
          - unbind
          - unbind-operator
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Login to registry
        run: helm registry login ghcr.io -u ${{ github.actor }} --password-stdin <<< "${{ secrets.GITHUB_TOKEN }}"

      - name: Package and push
        run: |
          chart_dir="deploy/charts/charts/${{ matrix.chart }}"
          helm package "$chart_dir" --destination "$RUNNER_TEMP"
          helm push "$RUNNER_TEMP"/*.tgz oci://ghcr.io/unbindapp/charts
