# environments/default.yaml
# Default environment settings

components:
  longhorn:
    enabled: false
  victoriaMetricsStack:
    enabled: true
  buildkitd:
    enabled: true
  postgresOperator:
    enabled: true
  database:
    enabled: true
  redis:
    enabled: true
  alloy:
    enabled: true
  loki:
    enabled: true
  registry:
    enabled: true
  # Networking data plane. By default the installed controller derives from the
  # top-level networkingProvider value: gateway -> Envoy Gateway, nginx ->
  # ingress-nginx. Set components.{envoyGateway,ingressNginx,traefik}.enabled to
  # override explicitly.
  #
  # MIGRATION: existing ingress-nginx clusters MUST set the top-level
  #   networkingProvider: nginx
  # before upgrading, otherwise ingress-nginx is uninstalled in favour of the
  # gateway provider.
  certManager:
    enabled: true

overrides:
  longhorn:
    persistence:
      defaultClass: true
      defaultClassReplicaCount: 1
      reclaimPolicy: Retain
    defaultSettings:
      defaultReplicaCount: 1
  victoriaMetricsStack:
    # Configurable retention period
    retention: "7d"
    # Configurable storage size
    storage: "3Gi"
  buildkitd:
    image: moby/buildkit:v0.31.0-rootless
    replicas: 1
    maxParallism: 2
  postgresOperator:
    spiloImage: ghcr.io/unbindapp/spilo:18-27713048842
  database:
    replicaCount: 1
    storage: "2Gi"
    resources:
      limits:
        cpu: 500m
        memory: 1Gi
  alloy:
    loki:
      endpoint:
        host: loki-gateway
        port: 80
        # namespace: // Defaults to global.namespace
  loki:
    retentionPeriod: 72h
    lokiStorageSize: 2Gi

  registry:
    replicaCount: 1
    persistence:
      size: 4Gi
    cleanup:
      threshold: 3Gi # This should be around 80% of the total size, this is for the auto cleanup job
      schedule: "0 * * * *" # Cron schedule for the auto cleanup job

  certManager:
    replicaCount: 2

  unbind:
    # Unbind operator settings
    operator:
      repository: ghcr.io/unbindapp/unbind-operator

    # App Configuration (merged image: the API serves the SPA)
    api:
      repository: ghcr.io/unbindapp/unbind
      pullPolicy: Always
      replicaCount: 1
      # Database configuration for API
      database:
        # host: pg-unbind
        port: 5432
        name: unbind
        user: unbind
        secretName: unbind.pg-unbind.credentials.postgresql.acid.zalan.do
      # Redis Redis configuration
      redis:
        url: redis-headless.unbind-system:6379
      # Builder configuration
      buildImager: unbindapp/unbind-builder:latest
      # Registry configuration
      registry:
        # host: docker-registry.unbind-system:5000
        password: "TODO"
      # Buildkit configuration
      buildkit:
        host:
      # Logging and monitoring
      loki:
        endpoint: http://loki-gateway.unbind-system.svc.cluster.local
      prometheus:
        endpoint: http://vmsingle-victoria-metrics-k8s-stack.unbind-system:8428
      resources:
        limits:
          cpu: 250m
          memory: 512Mi
