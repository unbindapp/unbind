{{- /*
Gateway API equivalents of the platform's own Ingresses, used when the cluster
runs the gateway provider (Envoy Gateway by default). The /api/go and /api/oauth2
prefixes are rewritten to / via a URLRewrite filter, mirroring the nginx
rewrite-target. TLS is terminated at the shared Gateway listener.
*/}}
{{- if and .Values.api.enabled .Values.api.ingress.enabled (eq (.Values.networkingProvider | default "nginx") "gateway") }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.api.name }}-route
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "unbind.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gatewayName | default "unbind-gateway" }}
      namespace: {{ .Values.global.namespace }}
      kind: Gateway
      group: gateway.networking.k8s.io
  hostnames:
    - {{ .Values.ingress.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/go
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: {{ .Values.api.name }}
          port: {{ .Values.api.service.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /api/oauth2
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: {{ .Values.api.name }}
          port: {{ .Values.api.service.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Values.api.name }}
          port: {{ .Values.api.service.port }}
{{- end }}
