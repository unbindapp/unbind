apiVersion: v1
kind: Service
metadata:
  name: docker-registry
  namespace: {{ .Release.Namespace }}
spec:
  {{- if .Values.service.clusterIP }}
  clusterIP: {{ .Values.service.clusterIP }}
  {{- end }}
  selector:
    app: registry
  ports:
    - port: 5000
      targetPort: 5000
{{- if .Values.service.nodePort.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: docker-registry-nodeport
  namespace: {{ .Release.Namespace }}
spec:
  type: NodePort
  selector:
    app: registry
  ports:
  - port: 5000
    targetPort: 5000
    nodePort: {{ .Values.service.nodePort.port }}
{{- end }}
