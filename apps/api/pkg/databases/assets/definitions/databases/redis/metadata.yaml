name: "Redis"
description: "Standard Redis installation using CloudPirates Redis chart"
type: "helm"
version: "1.0.0"
chart:
  name: "redis"
  version: "0.30.4"
  repository: "oci://registry-1.docker.io/cloudpirates"
  repositoryName: "redis"
port: 6379
imports:
  - path: "../../common/base.yaml"
    as: base
  - path: "../../common/labels.yaml"
    as: labelsSchema
schema:
  properties:
    secretName:
      type: "string"
      description: "Name of the secret to store Redis password"
      required: true
    secretKey:
      type: "string"
      description: "Key in the secret that contains the redis password"
      required: true
    version:
      type: "string"
      # 8.x only: Redis returned to an open license (AGPLv3) starting at 8.0;
      # the 7.x line was under the restrictive SSPL/RSAL, so we don't offer it.
      description: "Redis version"
      default: "8.8"
      enum: ["8.4", "8.6", "8.8"]
    common:
      $ref: "#/imports/base"
    labels:
      $ref: "#/imports/labelsSchema"
