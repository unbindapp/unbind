# definitions/databases/redis/definition.yaml
# Helm values for CloudPirates Redis chart

# Total nodes (default 1). int-coerce: schema defaults are float64 and `gt` needs matching types.
{{- $requestedReplicas := .Parameters.common.replicas | default 1 | int -}}

# Apply common labels to all resources created by the chart
commonLabels:
  unbind/usd-type: {{ .Definition.Type | quote }}
  unbind/usd-version: {{ .Definition.Version | quote }}
  unbind/usd-category: databases
  {{- range $key, $value := .Parameters.labels }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}

# Image configuration - tag follows the selected version (default 8.8)
image:
  registry: docker.io
  repository: redis
  tag: {{ .Parameters.version | default "8.8" | quote }}

# Authentication
auth:
  enabled: true
  existingSecret: {{ .Parameters.secretName | quote }}
  existingSecretPasswordKey: {{ .Parameters.secretKey | quote }}

{{- if gt $requestedReplicas 1 }}
# --- Replication Mode ---
# Triggered if .Parameters.common.replicas >= 2
# replicaCount is total nodes (1 master + N-1 replicas)

architecture: replication
replicaCount: {{ $requestedReplicas }}

{{- else }}
# --- Standalone Mode ---
# Triggered if .Parameters.common.replicas = 1 (or omitted, as default is 1)

architecture: standalone

{{- end }}

# Persistence configuration
# Quote values: CloudPirates' schema requires these as strings (unquoted "10" -> number).
persistence:
  enabled: true
  size: {{ .Parameters.common.storage | default "1Gi" | quote }}

# Resource configuration
resources:
  requests:
    cpu: {{ .Parameters.common.resources.requests.cpu | default "100m" | quote }}
    memory: {{ .Parameters.common.resources.requests.memory | default "128Mi" | quote }}
  limits:
    cpu: {{ .Parameters.common.resources.limits.cpu | default "500m" | quote }}
    memory: {{ .Parameters.common.resources.limits.memory | default "256Mi" | quote }}

# Disable metrics
metrics:
  enabled: false
