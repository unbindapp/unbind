# Monorepo pre-commit hooks. Each app's hooks are scoped via `files:` so they only
# run when that app's folder changes, and `cd` into the app so module-relative tools
# (go.mod, .golangci.yml, eslint/prettier config) resolve correctly.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: check-yaml
        # k8s manifests use multi-document streams.
        args: [--allow-multiple-documents]
        # Go-templated YAML isn't plain YAML: helm charts/helmfile are validated by
        # helm/helmfile, and the embedded service-definition templates by the
        # databases renderer tests. Their metadata/schema YAML stays checked here.
        exclude: ^(deploy/charts/|apps/operator/dist/|apps/api/pkg/databases/assets/.*definition\.yaml$)
      - id: end-of-file-fixer

  - repo: local
    hooks:
      # --- apps/api ---
      - id: api-go-mod-tidy
        name: "api: go mod tidy"
        entry: bash -c 'cd apps/api && go mod tidy'
        language: system
        files: ^apps/api/.*\.(go|mod|sum)$
        pass_filenames: false
      - id: api-gofmt
        name: "api: gofmt -s"
        entry: bash -c 'cd apps/api && out=$(gofmt -s -l .) && [ -z "$out" ] || { echo "$out"; exit 1; }'
        language: system
        files: ^apps/api/.*\.go$
        pass_filenames: false
      - id: api-golangci-lint
        name: "api: golangci-lint"
        entry: bash -c 'cd apps/api && golangci-lint run'
        language: system
        files: ^apps/api/.*\.go$
        pass_filenames: false

      # --- apps/operator ---
      - id: operator-go-mod-tidy
        name: "operator: go mod tidy"
        entry: bash -c 'cd apps/operator && go mod tidy'
        language: system
        files: ^apps/operator/.*\.(go|mod|sum)$
        pass_filenames: false
      - id: operator-gofmt
        name: "operator: gofmt -s"
        entry: bash -c 'cd apps/operator && out=$(gofmt -s -l .) && [ -z "$out" ] || { echo "$out"; exit 1; }'
        language: system
        files: ^apps/operator/.*\.go$
        pass_filenames: false
      - id: operator-golangci-lint
        name: "operator: golangci-lint"
        entry: bash -c 'cd apps/operator && golangci-lint run'
        language: system
        files: ^apps/operator/.*\.go$
        pass_filenames: false

      # --- apps/installer ---
      - id: installer-go-mod-tidy
        name: "installer: go mod tidy"
        entry: bash -c 'cd apps/installer && go mod tidy'
        language: system
        files: ^apps/installer/.*\.(go|mod|sum)$
        pass_filenames: false
      - id: installer-gofmt
        name: "installer: gofmt -s"
        entry: bash -c 'cd apps/installer && out=$(gofmt -s -l .) && [ -z "$out" ] || { echo "$out"; exit 1; }'
        language: system
        files: ^apps/installer/.*\.go$
        pass_filenames: false

      # --- deploy/charts ---
      - id: charts-helm-lint
        name: "charts: helm lint"
        entry: bash -c 'command -v helm >/dev/null || { echo "helm not installed, skipping"; exit 0; }; helm lint deploy/charts/charts/*'
        language: system
        files: ^deploy/charts/charts/
        pass_filenames: false
      - id: charts-helmfile-build
        name: "charts: helmfile build"
        entry: bash -c 'command -v helmfile >/dev/null || { echo "helmfile not installed, skipping"; exit 0; }; helmfile --file deploy/charts/helmfile.yaml.gotmpl build >/dev/null'
        language: system
        files: ^deploy/charts/
        pass_filenames: false

      # --- apps/web (staged files only; paths are repo-relative so strip the
      #     apps/web/ prefix before running from inside apps/web) ---
      - id: web-eslint
        name: "web: eslint"
        entry: bash -c 'cd apps/web && exec npx --no-install eslint "${@#apps/web/}"' --
        language: system
        files: ^apps/web/.*\.(t|j)sx?$
        pass_filenames: true
      - id: web-prettier
        name: "web: prettier --check"
        entry: bash -c 'cd apps/web && exec npx --no-install prettier --check --ignore-unknown "${@#apps/web/}"' --
        language: system
        files: ^apps/web/.*\.(tsx?|jsx?|css|json|md)$
        pass_filenames: true
